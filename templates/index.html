<!DOCTYPE html>

<body>

<div class="container-fluid px-5 mt-4 mb-4"></div>

<div class="card">

<div class="hero">
    <img src="{{ url_for('static', filename='images/hero.png') }}"

</div>

<div class="card-body">

<form action="/predict" method="POST"onsubmit="loading()">
<div class="section-card">
<h5>👤Passenger Details</h5>

<div class="row">

<div class="col-lg-6 col-md-6  mb-3">
<label>Age</label>
<input class="form-control"
type="number"
name="age"
min="1"
max="105"
placeholder="e.g. 35"
onkeydown="return validateAge(event)"
oninput="checkAge(this)"
required>
<small id="ageError" class="text-danger"></small>
</div>

<div class="col-lg-6 col-md-6 mb-3">
<label>Flight Distance</label>
<input class="form-control"
type="number"
name="flight distance"
min="0"
onkeydown="return validateFlight(event)"
placeholder="e.g. 1200 km"
required>
<small id="flightError" class="text-danger"></small>
</div>

<div class="col-lg-6 col-md-6  mb-3">
<label>Departure Delay</label>
<input class="form-control"
type="number"
min="0" 
name="departure delay"
placeholder="e.g. 10 minutes"
onkeydown="return validateDeparture(event)"
required>
<small id="departureError" class="text-danger"></small>
</div>

<div class="col-lg-6 col-md-6  mb-3">
<label>Arrival Delay</label>
<input class="form-control"
type="number"
min="0" 
name="arrival delay"
placeholder="e.g. 5 minutes"
onkeydown="return validateArrival(event)"
required>
<small id="arrivalError" class="text-danger"></small>
</div>

</div>
</div>
<hr>

<div class="section-card">
<h5>✈ Travel Details</h5>

<div class="row">

    <div class="col-md-3 mb-3">
        <label>Gender</label>
        <select class="form-select" name="gender" required>
            <option value="" selected disabled></option>

            <option value="Female">Female</option>
        </select>
    </div>

    <div class="col-md-3 mb-3">
        <label>Customer Type</label>
        <select class="form-select" name="customer_type" required>
            <option value="" selected disabled></option>
            <option value="Returning">Returning</option>
            <option value="First-time">First-time</option>
        </select>
    </div>

    <div class="col-md-3 mb-3">
        <label>Travel Type</label>
        <select class="form-select" name="travel_type" required>
            <option value="" selected disabled></option>

            <option value="Personal">Personal</option>

    </div>

    <div class="col-md-3 mb-3">
        <label>Travel Class</label>
        <select class="form-select" name="travel_class" required>
            <option value="" selected disabled></option>
            <option value="Business">Business</option>

</div>
</div>
<br>

<div class="row">

    <div class="col-md-6">
        <button
        class="btn btn-primary w-100"
        type="submit"
        id="predictBtn">
            🔍 Predict Satisfaction
        </button>
    </div>

    <div class="col-md-6">
        <button
        class="btn btn-secondary w-100"
        type="reset">
            🔄 Reset Form
        </button>
    </div>

</div>

</form>

{% if prediction %}

<div class="alert {% if prediction == 'Satisfied' %}alert-success{% else %}alert-danger{% endif %} mt-4 text-center shadow">

    {% if prediction == "Satisfied" %}
        <h2>✅ Passenger is likely to be SATISFIED</h2>
    {% else %}
        <h2>❌ Passenger is likely to be NEUTRAL OR DISSATISFIED</h2>
    {% endif %}

    <h4 class="mt-3">
        Confidence: {{ confidence }}%
    </h4>

</div>

{% endif %}

</div>

</div>

</div>
<script>

function validateAge(event){

    const error = document.getElementById("ageError");

    if(event.key=="-"){
        error.innerHTML="❌ Negative values are not allowed.";
        event.preventDefault();
        return false;
    }

    if(event.key=="e" || event.key=="E"){
        error.innerHTML="❌ Please enter a valid age.";
        event.preventDefault();
        return false;
    }

    error.innerHTML="";
    return true;
}

function checkAge(input){

    const error = document.getElementById("ageError");

    if(input.value > 105){
        error.innerHTML="❌ Age must be between 1 and 105 years.";
        input.value="";
    }else{
        error.innerHTML="";
    }

}
function validateFlight(event){

    const error = document.getElementById("flightError");

    if(event.key=="-" || event.key=="e" || event.key=="E"){
        error.innerHTML="❌ Negative values are not allowed.";
        event.preventDefault();
        return false;
    }

    error.innerHTML="";
    return true;
}

function validateDeparture(event){

    const error = document.getElementById("departureError");

    if(event.key=="-" || event.key=="e" || event.key=="E"){
        error.innerHTML="❌ Negative values are not allowed.";
        event.preventDefault();
        return false;
    }

    error.innerHTML="";
    return true;
}

function validateArrival(event){

    const error = document.getElementById("arrivalError");

    if(event.key=="-" || event.key=="e" || event.key=="E"){
        error.innerHTML="❌ Negative values are not allowed.";
        event.preventDefault();
        return false;
    }

    error.innerHTML="";
    return true;
}
function loading(){

    const btn = document.getElementById("predictBtn");

    btn.disabled = true;
    btn.innerHTML =  '<span class="spinner-border spinner-border-sm"></span> Predicting...';

}

</script>
